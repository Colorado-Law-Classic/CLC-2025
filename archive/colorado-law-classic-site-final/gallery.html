<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Colorado Law Classic</title>
  <meta name="description" content="View photos from past Colorado Law Classic tournaments. Filter by year and relive the excitement on the course.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="index.html" class="brand" data-nav>
        <img src="assets/img/clc-logo.jpg" alt="Colorado Law Classic logo" class="logo-image">
        <span>Colorado Law Classic</span>
      </a>
      <div>
        <a href="index.html" data-nav>Home</a>
        <a href="sponsors.html" data-nav>Sponsors</a>
        <a href="https://coloradolawclassic.org/home/register-here/" target="_blank" rel="noopener" class="btn btn-small" data-nav>Register</a>
        <a href="gallery.html" data-nav>Gallery</a>
        <a href="faq.html" data-nav>FAQ</a>
      </div>
    </div>
  </nav>

  <section class="container">
    <h1>Gallery</h1>
    <p>Take a look at highlights from recent Colorado Law Classic tournaments. Click on each year to filter photos.</p>
    
    <div class="gallery-buttons">
      <button data-filter="all" class="active">All</button>
      <button data-filter="2025">2025</button>
      <button data-filter="2024">2024</button>
    </div>
    
    <div class="gallery-grid">
      <!-- Sample image entries; replace with actual photos. Add your images to assets/img/gallery and update the data-year and src accordingly. -->
      <!-- 2025 photos from the upcoming event flyer and keynote speaker -->
      <img src="assets/img/gallery/2025-1.jpg" alt="2025 Colorado Law Classic flyer" data-year="2025" data-reveal loading="lazy">
      <img src="assets/img/gallery/2025-2.jpg" alt="2025 Colorado Law Classic kickoff speaker" data-year="2025" data-reveal loading="lazy">
      <!-- 2024 photos (real shots from prior tournaments) -->
      <img src="assets/img/gallery/golfers-group.jpg" alt="2024 Colorado Law Classic golfers" data-year="2024" data-reveal loading="lazy">
      <img src="assets/img/gallery/trophy-team.jpg" alt="2024 Colorado Law Classic winning team" data-year="2024" data-reveal loading="lazy">
    </div>
  </section>

  <footer>
    <div class="container">
      &copy; 2025 Colorado Law Classic. All rights reserved.
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
