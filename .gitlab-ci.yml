# GitLab CI/CD Pipeline for CLC Website
# Deploys static site to GitLab Pages on every push to main

stages:
  - deploy

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir .public
    - cp -r assets .public/
    - cp *.html .public/
    - cp CNAME .public/ 2>/dev/null || true
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
