<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Colorado Law Classic</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Redirects all 404s to index.html with the path preserved
      const path = window.location.pathname;
      const repo = '/CLC-2025';
      if (path.startsWith(repo)) {
        const route = path.slice(repo.length) || '/';
        sessionStorage.setItem('redirect', route);
      }
      window.location.replace(repo + '/');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
